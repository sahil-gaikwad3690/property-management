<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace · Estate</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__in">
    <a class="brand" href="/dashboard">
      <div class="brand__mark">E</div>
      <div class="brand__name">Estate</div>
    </a>
    <nav class="topnav">
      <a href="/dashboard">Dashboard</a>
      <a href="/marketplace" class="active">Marketplace</a>
      <a href="/inquiries">Inquiries</a>
    </nav>
    <div class="topbar__right">
      <div class="who"><div class="nm" id="who-name">—</div><div class="rl">Buyer</div></div>
      <div class="avatar" id="who-avatar">?</div>
      <button class="btn btn-ghost" id="logout">Log out</button>
    </div>
  </div>
</header>

<main class="wrap fade-in">
  <div class="pagehead">
    <div>
      <span class="eyebrow">Buy a property</span>
      <h1>Marketplace</h1>
      <p id="sub-line">Properties listed for sale by other owners.</p>
    </div>
  </div>

  <section id="grid" class="grid"></section>
</main>

<script src="/static/app.js"></script>
<script>
  if (!requireAuth()) {}
  const user = getUser() || {};
  document.getElementById("who-name").textContent = user.full_name || "Buyer";
  document.getElementById("who-avatar").textContent = initials(user.full_name);
  document.getElementById("logout").addEventListener("click", logout);

  const grid = document.getElementById("grid");

  function specsIcon(d) {
    return `
      <span title="Bedrooms"><svg class="ic" viewBox="0 0 24 24"><path d="M3 18v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6M3 14h18M6 10V8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/></svg><b>${d.bedrooms}</b> bd</span>
      <span title="Bathrooms"><svg class="ic" viewBox="0 0 24 24"><path d="M4 12h16v3a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-3ZM7 12V6a2 2 0 0 1 4 0"/></svg><b>${d.bathrooms}</b> ba</span>
      ${d.area_sqft ? `<span title="Area"><svg class="ic" viewBox="0 0 24 24"><path d="M4 4h16v16H4zM4 9h16M9 4v16"/></svg><b>${d.area_sqft}</b> ft²</span>` : ""}
    `;
  }

  function card(p) {
    const media = p.image_url
      ? `<img src="${esc(p.image_url)}" alt="${esc(p.title)}" loading="lazy"
              onerror="this.parentElement.innerHTML='<div class=&quot;ph&quot;>No image</div>'">`
      : `<div class="ph">No image</div>`;
    return `
      <article class="card">
        <div class="card__media">
          ${media}
          <span class="tag sale">For Sale</span>
        </div>
        <div class="card__body">
          <div class="card__type">${esc(p.type)}</div>
          <div class="card__title">${esc(p.title)}</div>
          <div class="card__addr">
            <svg class="ic" viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
            ${esc(p.address)}, ${esc(p.city)}
          </div>
          <div class="card__specs">${specsIcon(p)}</div>
          <div class="card__foot">
            <div class="card__rent">${inr(p.sale_price)}</div>
            <div class="card__actions">
              <button class="btn btn-primary" data-id="${p.id}" data-title="${esc(p.title)}" data-price="${p.sale_price}">Make an offer</button>
            </div>
          </div>
        </div>
      </article>`;
  }

  async function load() {
    grid.innerHTML = Array.from({length:3}).map(()=>'<div class="skeleton"></div>').join("");
    try {
      const items = await api("/api/marketplace");
      if (!items.length) {
        grid.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <h3>Nothing for sale right now</h3>
            <p>When other owners list a property for sale, it'll show up here.</p>
          </div>`;
        return;
      }
      grid.innerHTML = items.map(card).join("");
    } catch (e) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><h3>Couldn't load the marketplace</h3><p>${esc(e.message)}</p></div>`;
    }
  }

  async function makeOffer(id, title, listPrice) {
    const amountStr = prompt(`Make an offer for "${title}"\nListed at ₹${Number(listPrice).toLocaleString("en-IN")}\n\nEnter your offer amount (₹):`, listPrice);
    if (amountStr === null) return;
    const offer = Number(amountStr);
    if (!offer || offer <= 0) return alert("Please enter a valid offer amount.");
    const message = prompt("Add a short message to the owner (optional):", "I'm interested in this property.") || "";
    try {
      await api(`/api/properties/${id}/inquiries`, {
        method: "POST",
        body: JSON.stringify({ message: message.trim(), offer_amount: offer }),
      });
      alert("Your offer was sent! Track it under Inquiries.");
    } catch (e) { alert(e.message); }
  }

  grid.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-id]");
    if (btn) makeOffer(btn.dataset.id, btn.dataset.title, Number(btn.dataset.price));
  });

  load();
</script>
</body>
</html>
